<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-JUST PharmD CGPA Simulator</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    /* CSS Variables for Easy Theme Switching */
    :root {
      --primary: #0f2c59;      
      --secondary: #d80032;    
      --success: #008000;
      --background: #f4f7f6;   
      --card-bg: #ffffff;      
      --text-main: #333333;
      --text-muted: #777777;
      --table-border: #eeeeee;
      --table-header-bg: #f4f7f6;
      --input-bg: #f9f9f9;
      --input-border: #cccccc;
      --gpa-bar-bg: #eef2f5;
    }

    [data-theme="dark"] {
      --primary: #5fa8d3;       
      --secondary: #ff4757;     
      --success: #2ecc71;       
      --background: #121212;   
      --card-bg: #1e1e1e;      
      --text-main: #e0e0e0;
      --text-muted: #aaaaaa;
      --table-border: #333333;
      --table-header-bg: #1a1a1a;
      --input-bg: #2c2c2c;
      --input-border: #444444;
      --gpa-bar-bg: #252525;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      background-color: var(--background); 
      color: var(--text-main); 
      margin: 0; 
      padding: 20px 20px 100px 20px; 
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 { 
      margin: 0;
      color: var(--primary); 
      font-weight: 700;
      letter-spacing: -0.5px;
      text-transform: uppercase;
    }

    .theme-btn {
      background: var(--card-bg);
      color: var(--text-main);
      border: 2px solid var(--table-border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-btn:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .semester { 
      background: var(--card-bg); 
      border-radius: 12px; 
      padding: 25px; 
      margin-bottom: 30px; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border-top: 4px solid var(--primary);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    h2 { 
      margin-top: 0; 
      color: var(--primary); 
      border-bottom: 2px solid var(--table-border); 
      padding-bottom: 15px; 
      font-size: 1.4rem;
    }

    .table-container {
      overflow-x: auto; 
    }

    table { 
      border-collapse: collapse; 
      width: 100%; 
      margin-bottom: 10px; 
      margin-top: 10px;
    }

    th { 
      background: var(--table-header-bg); 
      color: var(--primary); 
      padding: 12px; 
      font-weight: 600; 
      font-size: 0.9rem;
      text-transform: uppercase;
      border-bottom: 2px solid var(--table-border);
      transition: background-color 0.3s ease;
    }

    td { 
      padding: 12px 8px; 
      text-align: center; 
      border-bottom: 1px solid var(--table-border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    
    input[type="number"] { 
      width: 65px; 
      padding: 8px; 
      border: 1px solid var(--input-border); 
      border-radius: 6px; 
      text-align: center; 
      font-size: 14px;
      font-family: inherit;
      color: var(--text-main);
      background-color: var(--input-bg);
      transition: all 0.3s ease;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary);
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
      -webkit-appearance: none; margin: 0; 
    }

    .note { 
      font-size: 12px; 
      color: var(--text-muted); 
      font-style: italic; 
      display: block; 
      text-align: right;
      margin-bottom: 20px;
    }

    .gpa { 
      background: var(--gpa-bar-bg); 
      padding: 15px; 
      border-radius: 8px; 
      display: flex; 
      justify-content: space-around; 
      align-items: center; 
      flex-wrap: wrap;
      gap: 10px;
      font-weight: 600; 
      color: var(--primary); 
      transition: background-color 0.3s ease;
    }

    .gpa span { display: flex; align-items: center; gap: 8px; }

    .add-btn { 
      background: var(--secondary); 
      color: white; 
      border: none; 
      padding: 12px 20px; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 15px; 
      font-weight: 600;
      margin-top: 20px; 
      width: 100%;
      transition: background 0.3s ease, transform 0.1s ease;
    }

    .add-btn:hover { background: #b00028; }
    .add-btn:active { transform: scale(0.98); }

    .creators-credit {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      transition: color 0.3s ease;
    }

    .creators-credit span {
      color: var(--primary);
    }

    .cgpa-box {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--primary);
      color: #ffffff; 
      text-align: center;
      padding: 20px 10px;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
      box-sizing: border-box;
      transition: background-color 0.3s ease;
    }

    .scholarship {
      color: #ffd700; 
      font-weight: 800;
      margin-left: 10px;
      text-shadow: 0px 1px 3px rgba(0,0,0,0.5);
      animation: pop 0.5s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    th:nth-child(1), td:nth-child(1) { width: 10%; font-weight: bold; color: var(--primary); }
    th:nth-child(2), td:nth-child(2) { width: 25%; text-align: left; }
    th:nth-child(3), td:nth-child(3) { width: 8%; }
    th:nth-child(4), td:nth-child(4) { width: 10%; color: var(--text-muted); }
    th:nth-child(5), td:nth-child(5) { width: 12%; }
    th:nth-child(6), td:nth-child(6) { width: 12%; }
    th:nth-child(7), td:nth-child(7) { width: 8%; font-weight: bold; font-size: 1.1rem; }
    th:nth-child(8), td:nth-child(8) { width: 8%; }
    th:nth-child(9), td:nth-child(9) { width: 7%; color: var(--secondary); font-size: 0.9rem;}
  </style>
</head>
<body>

  <div class="container">
    <div class="header-container">
      <h1>PharmD CGPA Simulator</h1>
      <button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
    </div>
    
    <div id="semesters"></div>

    <div class="creators-credit">
      Made by <span>Youssef Yasser</span>
    </div>
  </div>

  <div id="cgpaBox" class="cgpa-box">Cumulative GPA (CGPA): - | GPA Credits: 0 | Passed: 0</div>

  <script>
    const gradingSystem = [
      {min: 95, grade: "A+", point: 4.0},
      {min: 90, grade: "A", point: 3.7},
      {min: 85, grade: "B+", point: 3.3},
      {min: 80, grade: "B", point: 3.0},
      {min: 75, grade: "C+", point: 2.7},
      {min: 70, grade: "C", point: 2.3},
      {min: 65, grade: "D+", point: 2.0},
      {min: 60, grade: "D", point: 1.7},
      {min: 0,  grade: "F", point: 1.0}
    ];

    const semesters = [
      {
        name: "Semester 1 (Fall - Level 1)",
        courses: [
          { code: "PMC111", name: "Pharmaceutical Analytical Chemistry I", credit: 3 },
          { code: "PMC112", name: "Pharmaceutical Organic Chemistry I", credit: 3 },
          { code: "PHG111", name: "Medicinal Plants", credit: 3 },
          { code: "NPC111", name: "Information Technology", credit: 2 },
          { code: "LRA401", name: "Japanese Language (1)", credit: 1, inGPA: false },
          { code: "PIP111", name: "Pharmacy Orientation", credit: 1 },
          { code: "MED111", name: "Medical Terminology", credit: 1 },
          { code: "LRA415", name: "Human Rights and Fighting Corruption", credit: 1, inGPA: false },
          { code: "MTH114", name: "Calculus", credit: 1 },
          { code: "LRA101P", name: "Japanese Culture", credit: 1, inGPA: false }
        ]
      },
      {
        name: "Semester 2 (Spring - Level 1)",
        courses: [
          { code: "PMC123", name: "Pharmaceutical Analytical Chemistry II", credit: 3 },
          { code: "PMC124", name: "Pharmaceutical Organic Chemistry II", credit: 3 },
          { code: "MED122", name: "Human Anatomy & Histology", credit: 3 },
          { code: "PIP122", name: "Physical Pharmacy", credit: 3 },
          { code: "PHG122", name: "Pharmacognosy I", credit: 3 },
          { code: "PBM121", name: "Cell Biology", credit: 2 },
          { code: "LRA402", name: "Japanese Language (2)", credit: 1, inGPA: false },
          { code: "NPC122", name: "Psychology", credit: 1 }
        ]
      }
    ];

    let currentSemesters = 1;
    let currentScholarshipLevel = 0; 
    let scholarshipTimer = null; 

    // --- DARK MODE LOGIC ---
    const themeToggle = document.getElementById('themeToggle');
    
    function toggleTheme(isDark) {
      if (isDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.textContent = "☀️ Light Mode";
      } else {
        document.documentElement.removeAttribute('data-theme');
        themeToggle.textContent = "🌙 Dark Mode";
      }
    }

    themeToggle.addEventListener('click', () => {
      const currentlyDark = document.documentElement.getAttribute('data-theme') === 'dark';
      toggleTheme(!currentlyDark);
    });

    // --- CORE SIMULATOR LOGIC ---
    function createSemester(sIndex) {
      const container = document.getElementById("semesters");
      const sem = semesters[sIndex];

      const div = document.createElement("div");
      div.classList.add("semester");
      div.id = `semester-${sIndex}`;

      const title = document.createElement("h2");
      title.textContent = sem.name;
      div.appendChild(title);

      const tableContainer = document.createElement("div");
      tableContainer.classList.add("table-container");

      const table = document.createElement("table");
      table.innerHTML = `
        <tr>
          <th>Code</th>
          <th>Course</th>
          <th>Credits</th>
          <th>Total</th>
          <th>Expected</th>
          <th>Lost</th>
          <th>Grade</th>
          <th>Points</th>
          <th>Lower</th>
        </tr>
      `;

      sem.courses.forEach((course, cIndex) => {
        const total = 100; 
        const creditDisplay = course.inGPA === false ? `${course.credit}*` : course.credit;
        
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${course.code}</td>
          <td>${course.name}</td>
          <td>${creditDisplay}</td>
          <td>${total}</td>
          <td><input id="mark-${sIndex}-${cIndex}" type="number" min="0" max="${total}" oninput="updateGrade(${sIndex}, ${cIndex}, false)"></td>
          <td><input id="lost-${sIndex}-${cIndex}" type="number" min="0" max="${total}" oninput="updateGrade(${sIndex}, ${cIndex}, true)"></td>
          <td id="grade-${sIndex}-${cIndex}">-</td>
          <td id="point-${sIndex}-${cIndex}">-</td>
          <td id="lower-${sIndex}-${cIndex}">-</td>
        `;
        table.appendChild(row);
      });

      tableContainer.appendChild(table);
      div.appendChild(tableContainer);

      const note = document.createElement("span");
      note.classList.add("note");
      note.textContent = "* Course is NOT calculated in the GPA.";
      div.appendChild(note);

      const gpaDiv = document.createElement("div");
      gpaDiv.classList.add("gpa");
      gpaDiv.innerHTML = `
        <span>GPA: <input id="gpaVal-${sIndex}" type="number" step="0.01" oninput="manualGPA(${sIndex}, true)"></span>
        <span>GPA Credits: <input id="gpaCredits-${sIndex}" type="number" step="1" oninput="manualGPA(${sIndex}, true)"></span>
        <span>Passed: <input id="gpaPassed-${sIndex}" type="number" step="1" oninput="manualGPA(${sIndex}, true)"></span>
      `;
      div.appendChild(gpaDiv);

      if (sIndex < semesters.length - 1) {
        const btn = document.createElement("button");
        btn.textContent = "+ Add Next Semester";
        btn.classList.add("add-btn");
        btn.onclick = () => {
          currentSemesters++;
          createSemester(currentSemesters - 1);
          btn.remove();
        };
        div.appendChild(btn);
      }

      container.appendChild(div);
    }

    function manualGPA(sIndex, fromInput=false) {
      const gpa = parseFloat(document.getElementById(`gpaVal-${sIndex}`).value);
      const credits = parseFloat(document.getElementById(`gpaCredits-${sIndex}`).value);
      const passed = parseFloat(document.getElementById(`gpaPassed-${sIndex}`).value);

      if (fromInput) {
        semesters[sIndex].courses.forEach((c, cIndex) => {
          delete c.point;
          delete c.grade;
          document.getElementById(`mark-${sIndex}-${cIndex}`).value = "";
          document.getElementById(`lost-${sIndex}-${cIndex}`).value = "";
          document.getElementById(`grade-${sIndex}-${cIndex}`).textContent = "-";
          document.getElementById(`point-${sIndex}-${cIndex}`).textContent = "-";
          document.getElementById(`lower-${sIndex}-${cIndex}`).textContent = "-";
        });
      }

      if (!isNaN(gpa) && !isNaN(credits)) {
        semesters[sIndex].manual = { gpa, credits, passed: passed || 0 };
      } else {
        delete semesters[sIndex].manual;
      }

      calculateCGPA();
    }

    function updateGrade(sIndex, cIndex, isLost) {
      const course = semesters[sIndex].courses[cIndex];
      const total = 100;

      const markInput = document.getElementById(`mark-${sIndex}-${cIndex}`);
      const lostInput = document.getElementById(`lost-${sIndex}-${cIndex}`);
      const gradeCell = document.getElementById(`grade-${sIndex}-${cIndex}`);
      const pointCell = document.getElementById(`point-${sIndex}-${cIndex}`);
      const lowerCell = document.getElementById(`lower-${sIndex}-${cIndex}`);

      if (semesters[sIndex].manual) {
        document.getElementById(`gpaVal-${sIndex}`).value = "";
        document.getElementById(`gpaCredits-${sIndex}`).value = "";
        document.getElementById(`gpaPassed-${sIndex}`).value = "";
        delete semesters[sIndex].manual;
      }

      if (isLost) {
        const lostRaw = lostInput.value;
        if (lostRaw === "" || isNaN(parseFloat(lostRaw))) {
          markInput.value = "";
          gradeCell.textContent = "-";
          pointCell.textContent = "-";
          lowerCell.textContent = "-";
          delete course.point;
          delete course.grade;
        } else {
          let lost = parseFloat(lostRaw);
          lost = Math.max(0, Math.min(total, lost));
          markInput.value = total - lost;
        }
      } else {
        const markRaw = markInput.value;
        if (markRaw === "" || isNaN(parseFloat(markRaw))) {
          lostInput.value = "";
          gradeCell.textContent = "-";
          pointCell.textContent = "-";
          lowerCell.textContent = "-";
          delete course.point;
          delete course.grade;
        } else {
          let mark = parseFloat(markRaw);
          mark = Math.max(0, Math.min(total, mark));
          lostInput.value = total - mark;
        }
      }

      const mark = Math.round(parseFloat(markInput.value));
      if (!isNaN(mark)) {
        const percentage = (mark / total) * 100;

        let idx = gradingSystem.findIndex(g => percentage >= g.min);
        if (idx === -1) idx = gradingSystem.length - 1;

        const gradeObj = gradingSystem[idx];
        
        if(gradeObj.grade.includes("A")) gradeCell.style.color = "var(--success)";
        else if(gradeObj.grade.includes("B") || gradeObj.grade.includes("C")) gradeCell.style.color = "var(--primary)";
        else if(gradeObj.grade === "F") gradeCell.style.color = "var(--secondary)";
        else gradeCell.style.color = "inherit";

        gradeCell.textContent = gradeObj.grade;
        pointCell.textContent = gradeObj.point.toFixed(2);
        course.point = gradeObj.point;
        course.grade = gradeObj.grade;

        if (gradeObj.min > 0) {
          const thresholdMarks = Math.ceil((gradeObj.min * total) / 100);
          const remaining = mark - thresholdMarks;
          lowerCell.textContent = remaining > 0 ? `${remaining}` : "-";
        } else {
          lowerCell.textContent = "-";
        }
      }

      const allCoursesEmpty = semesters[sIndex].courses.every(course => course.point === undefined);
      if (allCoursesEmpty) {
        document.getElementById(`gpaVal-${sIndex}`).value = "-";
        document.getElementById(`gpaCredits-${sIndex}`).value = "0";
        document.getElementById(`gpaPassed-${sIndex}`).value = "0";
      }

      calculateCGPA();
    }

    function triggerConfetti() {
      var duration = 3 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);

        var particleCount = 50 * (timeLeft / duration);
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    }

    function calculateCGPA() {
      let totalCredits = 0, totalPoints = 0, totalPassed = 0;

      semesters.forEach((sem, sIndex) => {
        if (sem.manual) {
          const { gpa, credits, passed } = sem.manual;
          totalCredits += credits;
          totalPoints += gpa * credits;
          totalPassed += passed;
        } else {
          let semCredits = 0, semPoints = 0, semPassed = 0;
          sem.courses.forEach(course => {
            if (course.point !== undefined) {
              if (course.inGPA !== false) {
                semCredits += course.credit;
                semPoints += course.credit * course.point;
              }
              if (course.grade !== "F") semPassed += course.credit;
            }
          });
          totalCredits += semCredits;
          totalPoints += semPoints;
          totalPassed += semPassed;

          const gpaInput = document.getElementById(`gpaVal-${sIndex}`);
          if (gpaInput) {
            if (semCredits > 0) {
              const gpa = semPoints / semCredits;
              gpaInput.value = gpa.toFixed(2);
              document.getElementById(`gpaCredits-${sIndex}`).value = semCredits;
              document.getElementById(`gpaPassed-${sIndex}`).value = semPassed;
            } else if (semPassed > 0) {
              gpaInput.value = "-";
              document.getElementById(`gpaCredits-${sIndex}`).value = 0;
              document.getElementById(`gpaPassed-${sIndex}`).value = semPassed;
            }
          }
        }
      });

      const cgpaBox = document.getElementById("cgpaBox");
      if (totalCredits > 0) {
        const rawCGPA = totalPoints / totalCredits;
        const cgpa = parseFloat(rawCGPA.toFixed(2));
        
        let targetLevel = 0;
        let scholarshipMsg = "";
        
        if (cgpa >= 3.85) {
            targetLevel = 40;
            scholarshipMsg = "<span class='scholarship'> | 🏆 40% Scholarship!</span>";
        } else if (cgpa >= 3.70) {
            targetLevel = 20;
            scholarshipMsg = "<span class='scholarship'> | 🏆 20% Scholarship!</span>";
        }

        cgpaBox.innerHTML = `Cumulative GPA (CGPA): ${cgpa.toFixed(2)} | GPA Credits: ${totalCredits} | Passed: ${totalPassed} ${scholarshipMsg}`;

        clearTimeout(scholarshipTimer);
        scholarshipTimer = setTimeout(() => {
            if (targetLevel > currentScholarshipLevel) {
                triggerConfetti();
            }
            currentScholarshipLevel = targetLevel;
        }, 800); 

      } else {
        cgpaBox.innerHTML = `Cumulative GPA (CGPA): - | GPA Credits: 0 | Passed: ${totalPassed}`;
        currentScholarshipLevel = 0;
      }
    }

    // بناء الترم الأول عند فتح الصفحة
    createSemester(0);

  </script>
</body>
</html>
